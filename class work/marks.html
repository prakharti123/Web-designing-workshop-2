<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

</head>
<body>
    <div class = "container">  
        <h1>Student Result Calculator</h1>
        <label for="marks">Enter marks (comma separated):</label>
        <input type="text" id="marks" name="marks">
        <button onclick="calculateResult()">Calculate Result</button>
        <p id="result"></p>
    </div>  
    <script>
        function calculateResult() {
            const marksInput = document.getElementById('marks').value;
            const marksArray = marksInput.split(',').map(Number);
            let total = 0;

            for (let i = 0; i < marksArray.length; i++) {
                total += marksArray[i];
            }

            const average = total / marksArray.length;
            let grade;

            switch (true) {
                case (average >= 90):
                    grade = 'A';
                    break;
                case (average >= 80):
                    grade = 'B';
                    break;
                case (average >= 70):
                    grade = 'C';
                    break;
                case (average >= 60):
                    grade = 'D';
                    break;
                default:
                    grade = 'F';
            }

            document.getElementById('result').innerText = `Average: ${average.toFixed(2)}, Grade: ${grade}`;
        }
    </script>


    
</body>
</html>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
    }

    h1 {
        color: #333;
        margin-bottom: 25px;
        text-align: center;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    button:hover {
        background: #764ba2;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        background: #f0f4ff;
        border-left: 4px solid #667eea;
        border-radius: 5px;
        color: #333;
        text-align: center;
        font-weight: 500;
    }
</style>
